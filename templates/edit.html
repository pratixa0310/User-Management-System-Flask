<!DOCTYPE html>
<html>
<head>
    <title>Edit User</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>Edit User</h1>

    <div class="card">

        <form method="POST">

            <div class="input-group">
                <label>Name</label>
                <input
                    type="text"
                    name="name"
                    value="{{ user.name }}"
                    required>
            </div>

            <div class="input-group">
                <label>Email</label>
                <input
                    type="email"
                    name="email"
                    value="{{ user.email }}"
                    required>
            </div>

            <button type="submit">
                Update User
            </button>

        </form>

    </div>

</div>

</body>
</html>
